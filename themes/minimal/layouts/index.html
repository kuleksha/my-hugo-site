<!DOCTYPE html>
<html>
<head>
    <title>{{ .Site.Title }}</title>
    <meta charset="utf-8">
</head>
<body>
    <h1 style="text-align: center; background-color: #1a2a6c; color: white; padding: 20px 0; margin: 0; width: 100%;">
    {{ .Site.Title }}
</h1>
<div style="max-width: 900px; margin: 20px auto; padding: 0 20px; line-height: 1.6; font-size: 1.1em;">
    {{ .Content }}
</div>

    <hr>
    {{ .Content }}
    <hr>
    <h2>Посты</h2>
    <ul>
    {{ range where .Site.RegularPages "Section" "posts" }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
    </ul>
</body>
</html>
