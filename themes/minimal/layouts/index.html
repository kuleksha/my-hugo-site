<!DOCTYPE html>
<html>
<head>
    <title>{{ .Site.Title }}</title>
    <meta charset="utf-8">
</head>
<body>
   
<h1 style="text-align: center; background-color: #1a2a6c; color: white; padding: 20px 0; margin: 0; width: 100%; font-family: sans-serif;">
    {{ .Site.Title }}
</h1>

<style>
  .main-content {
    max-width: 850px;
    margin: 30px auto;
    padding: 0 20px;
    line-height: 1.8;
    font-size: 1.1em;
    text-align: center;
    font-family: sans-serif;
    color: #333;
  }

  /* ТВОИ КНОПКИ (без изменений размера) */
  .menu-list {
    list-style: none;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin: 0;
  }

  .menu-list li a {
    text-decoration: none;
    background-color: #ffffff;
    color: #000080;
    padding: 18px 35px; /* Твой размер */
    font-size: 1.2em;   /* Твой размер */
    border-radius: 10px;
    border: 2px solid #000080;
    transition: 0.3s;
    font-family: sans-serif;
    font-weight: bold;
    display: inline-block;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .menu-list li a:hover {
    background-color: #000080;
    color: white;
    transform: translateY(-3px);
  }
</style>

<!-- 1. АННОТАЦИЯ -->
<div class="main-content">
    {{ .Content }}
</div>

<!-- 2. БЛОК С КАРТИНКОЙ НА ВЕСЬ ЭКРАН И КНОПКАМИ ПОВЕРХ -->
<div style="position: relative; width: 100vw; left: 50%; right: 50%; margin-left: -50vw; overflow: hidden; line-height: 0;">
    
    <!-- КАРТИНКА ВО ВСЮ ШИРИНУ -->
    <img src="/images/Снимок1.JPG" alt="3D Принтер" style="width: 100%; height: auto; display: block;">

    <!-- КНОПКИ ПОВЕРХ -->
    <div style="position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); width: 100%; z-index: 10;">
        <ul class="menu-list">
            {{ range .Site.RegularPages }}
                {{ if .Title }} 
                <li>
                    <a href="{{ .Permalink }}">{{ .Title }}</a>
                </li>
                {{ end }} 
            {{ end }}
        </ul>
    </div>
</div>

</body>
</html>
