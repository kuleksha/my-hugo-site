<!DOCTYPE html>
<html>
<head>
    <title>{{ .Site.Title }}</title>
    <meta charset="utf-8">
</head>
<body>
   
<h1 style="text-align: center; background-color: #1a2a6c; color: white; padding: 20px 0; margin: 0; width: 100%; font-family: sans-serif;">
    {{ .Site.Title }}
</h1>

<style>
  .main-content {
    max-width: 850px;
    margin: 30px auto;
    padding: 0 20px;
    line-height: 1.8;
    font-size: 1.15em;
    text-align: center;
    font-family: sans-serif;
    color: #333;
  }

  .menu-list {
    list-style: none;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin: 40px auto; /* Отступ сверху и снизу от кнопок */
  }

  .menu-list li a {
    text-decoration: none;
    background-color: #ffffff;
    color: #000080;
    padding: 18px 35px; 
    font-size: 1.2em;   
    border-radius: 10px;
    border: 2px solid #000080;
    transition: 0.3s;
    font-family: sans-serif;
    font-weight: bold;
    display: inline-block;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .menu-list li a:hover {
    background-color: #000080;
    color: white;
    transform: translateY(-3px);
  }
</style>

<!-- 1. АННОТАЦИЯ -->
<div class="main-content">
    {{ .Content }}
</div>

<!-- 2. СИНЯЯ ЛИНИЯ -->
<hr style="border: 0; height: 10px; background: #1a2a6c; width: 100%; margin: 0;">

<!-- 3. КАРТИНКА ВО ВСЮ ШИРИНУ С ЗАТЕМНЕНИЕМ -->
<div style="width: 100vw; left: 50%; right: 50%; margin-left: -50vw; position: relative; overflow: hidden; background: black;">
    <img src="/images/Снимок1.JPG" alt="3D Принтер" style="width: 100%; height: auto; display: block; opacity: 0.7; filter: brightness(0.8);">
</div>

<!-- 4. КНОПКИ (ТЕПЕРЬ ПОД КАРТИНКОЙ) -->
<ul class="menu-list">
    {{ range .Site.RegularPages }}
        {{ if .Title }} 
        <li>
            <a href="{{ .Permalink }}">{{ .Title }}</a>
        </li>
        {{ end }} 
    {{ end }}
</ul>

</body>
</html>
</body>
</html>
