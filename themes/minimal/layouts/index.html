<!DOCTYPE html>
<html>
<head>
    <title>{{ .Site.Title }}</title>
    <meta charset="utf-8">
</head>
<body>
    <h1 style="text-align: center; width: 100%; display: block;">{{ .Site.Title }}</h1>

    <hr>
    {{ .Content }}

    <h2>Посты</h2>
    <ul>
    {{ range where .Site.RegularPages "Section" "posts" }}

    {{ end }}
    </ul>
</body>
</html>
