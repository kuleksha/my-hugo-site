<!DOCTYPE html>
<html>
<head>
    <title>{{ .Site.Title }}</title>
    <meta charset="utf-8">
</head>
<body>
   
<h1 style="text-align: center; background-color: #1a2a6c; color: white; padding: 20px 0; margin: 0; width: 100%; font-family: sans-serif;">
    {{ .Site.Title }}
</h1>

<style>
  .main-content {
    max-width: 850px;
    margin: 30px auto;
    padding: 0 20px;
    line-height: 1.8;
    font-size: 1.1em;
    text-align: center;
    font-family: sans-serif;
    color: #333;
  }

  /* Стиль кнопок поверх картинки */
  .menu-overlay {
    text-decoration: none;
    background-color: rgba(255, 255, 255, 0.85); /* Полупрозрачный белый */
    color: #000080;
    padding: 18px 35px; 
    font-size: 1.2em;
    border-radius: 10px;
    border: 2px solid #000080;
    transition: 0.3s;
    font-family: sans-serif;
    font-weight: bold;
    display: inline-block;
    backdrop-filter: blur(5px); /* Эффект стекла */
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .menu-overlay:hover {
    background-color: #000080;
    color: white;
    transform: translateY(-5px);
  }
</style>

<!-- 1. АННОТАЦИЯ -->
<div class="main-content">
    {{ .Content }}
</div>

<!-- 2. БЛОК: КАРТИНКА ВО ВСЮ ШИРИНУ + КНОПКИ ПОВЕРХ -->
<div style="position: relative; width: 100vw; left: 50%; right: 50%; margin-left: -50vw; margin-top: 40px; overflow: hidden; line-height: 0;">
    
    <!-- КАРТИНКА -->
    <img src="/images/Снимок1.JPG" alt="3D Принтер" style="width: 100%; height: auto; min-height: 400px; object-fit: cover; filter: brightness(0.8);">

    <!-- КНОПКИ ПОВЕРХ (Центрированы) -->
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; z-index: 10;">
        <ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">
            {{ range .Site.RegularPages }}
                {{ if .Title }} 
                <li>
                    <a href="{{ .Permalink }}" class="menu-overlay">{{ .Title }}</a>
                </li>
                {{ end }} 
            {{ end }}
        </ul>
    </div>
</div>

</body>
</html>
